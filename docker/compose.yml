services:
  django-app:
    container_name: afya-django
    profiles:
      - django
    build:
      context: ..
      dockerfile: docker/django.Dockerfile
    ports:
      - "${DJANGO_PORT:-4007}:8000"
    env_file:
      - ${ENV_FILE:-../.env}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-afya}
      POSTGRES_USER: ${POSTGRES_USER:-afya}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-afya}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      FLASK_BACKEND_URL: http://flask-backend:5002
    volumes:
      - ../backend:/app
      - ../frontend:/frontend
      - ../uploads:/uploads
    depends_on:
      - postgres
      - flask-backend

  flask-backend:
    build:
      context: ..
      dockerfile: docker/flask.Dockerfile
    ports:
      - "${FLASK_PORT:-5002}:5002"
    env_file:
      - ${ENV_FILE:-../.env}
    volumes:
      - ../backend:/app
      - ../uploads:/app/uploads

  express-gateway:
    container_name: afya-gateway
    build:
      context: ..
      dockerfile: docker/node.Dockerfile
    ports:
      - "4006:4000"
    env_file:
      - ${ENV_FILE:-../.env}
    volumes:
      - ..:/app
      - /app/node_modules
    depends_on:
      - flask-backend
      - mongodb

  mongodb:
    container_name: afya-mongodb
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  postgres:
    container_name: afya-postgres
    profiles:
      - django
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-afya}
      POSTGRES_USER: ${POSTGRES_USER:-afya}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-afya}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  mongodb_data:
  postgres_data:
