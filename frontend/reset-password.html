<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | Afya eHealth</title>
  <link rel="stylesheet" href="/cs/styles.css">
  <link rel="icon" href="/assets/tuungane.jpeg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="/js/particles-hero.js"></script>
</head>
<body>
  <main class="auth-main hero">
    <section class="auth-card">
      <div style="margin-bottom: 1.5rem;">
        <img src="/assets/tuungane.jpeg" alt="Afya" style="width:60px;height:60px;border-radius:14px;object-fit:cover;">
      </div>
      <h2 class="auth-title">Reset Password</h2>
      <p style="color: rgba(255,255,255,0.6); margin-bottom: 2rem;">Enter the code sent to your email and your new password.</p>

      <form class="auth-form" id="reset-form">
        <div class="form-group">
          <label for="code" class="form-label">Verification Code</label>
          <input type="text" id="code" name="code" class="form-input" placeholder="123456" required>
        </div>
        <div class="form-group">
          <label for="newPassword" class="form-label">New Password</label>
          <input type="password" id="newPassword" name="newPassword" class="form-input" placeholder="••••••••" required>
        </div>
        <button type="submit" class="cta-btn auth-btn" id="reset-btn">Update Password</button>
      </form>
      <p class="signup-link"><a href="/forgot-password">Resend Code</a> | <a href="/signin">Cancel</a></p>
    </section>
  </main>

  <script>
    const email = sessionStorage.getItem('reset_email');
    if (!email) window.location.href = '/forgot-password';

    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('reset-btn');
      const code = document.getElementById('code').value;
      const newPassword = document.getElementById('newPassword').value;
      
      btn.disabled = true;
      btn.innerText = 'Updating...';
      
      try {
        const res = await fetch('/api/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, code, newPassword })
        });
        const data = await res.json();
        if (res.ok) {
          alert('Password updated! You can now sign in.');
          sessionStorage.removeItem('reset_email');
          window.location.href = '/signin';
        } else {
          alert(data.message || 'Error occurred');
        }
      } catch (err) {
        alert('Network error. Try again.');
      } finally {
        btn.disabled = false;
        btn.innerText = 'Update Password';
      }
    });
  </script>
</body>
</html>
