<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password | Afya eHealth</title>
  <link rel="stylesheet" href="/cs/styles.css">
  <link rel="icon" href="/assets/tuungane.jpeg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="/js/particles-hero.js"></script>
</head>
<body>
  <main class="auth-main hero">
    <section class="auth-card">
      <div style="margin-bottom: 1.5rem;">
        <img src="/assets/tuungane.jpeg" alt="Afya" style="width:60px;height:60px;border-radius:14px;object-fit:cover;">
      </div>
      <h2 class="auth-title">Forgot Password</h2>
      <p style="color: rgba(255,255,255,0.6); margin-bottom: 2rem;">Enter your email to receive a verification code.</p>

      <form class="auth-form" id="forgot-form">
        <div class="form-group">
          <label for="email" class="form-label">Email address</label>
          <input type="email" id="email" name="email" class="form-input" placeholder="name@example.com" required>
        </div>
        <button type="submit" class="cta-btn auth-btn" id="send-btn">Send Verification Code</button>
      </form>
      <p class="signup-link"><a href="/signin">Back to Sign In</a></p>
    </section>
  </main>

  <script>
    document.getElementById('forgot-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('send-btn');
      const email = document.getElementById('email').value;
      
      btn.disabled = true;
      btn.innerText = 'Sending...';
      
      try {
        const res = await fetch('/api/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json();
        if (res.ok) {
          sessionStorage.setItem('reset_email', email);
          alert(data.message);
          window.location.href = '/reset-password';
        } else {
          alert(data.message || 'Error occurred');
        }
      } catch (err) {
        alert('Network error. Try again.');
      } finally {
        btn.disabled = false;
        btn.innerText = 'Send Verification Code';
      }
    });
  </script>
</body>
</html>
