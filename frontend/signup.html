<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | Afya eHealth</title>
  <link rel="stylesheet" href="/cs/styles.css">
  <link rel="icon" href="/assets/tuungane.jpeg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="/js/particles-hero.js"></script>
  <style>
    /* Removed redundant styles to allow global styles.css to take over */
  </style>
</head>

<body>
  <main class="auth-main hero">
    <section class="auth-card">
      <div style="margin-bottom: 1.5rem;">
        <img src="/assets/tuungane.jpeg" alt="Afya" style="width:60px;height:60px;border-radius:14px;object-fit:cover;">
      </div>
      <h2 class="auth-title">Join Afya</h2>
      <p style="color: rgba(255,255,255,0.6); margin-bottom: 2rem;">Start your journey to better health diagnosis.
      </p>

      <form class="auth-form" id="signup-form">
        <div class="form-group">
          <label for="name" class="form-label">Full Name</label>
          <input type="text" id="name" name="name" class="form-input" placeholder="Afya Tuunganes" required>
        </div>
        <div class="form-group">
          <label for="email" class="form-label">Email</label>
          <input type="email" id="email" name="email" class="form-input" placeholder="name@example.com" required>
        </div>
        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required>
        </div>
        <button type="submit" class="cta-btn auth-btn">Create Account</button>
      </form>
      <p class="signup-link">Already have an account? <a href="/signin">Sign In</a></p>
    </section>
  </main>
  <script type="module" src="/js/layout.js"></script>
  <script type="module" src="/js/script.js"></script>
</body>

</html>
