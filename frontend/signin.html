<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | Afya eHealth</title>
  <link rel="stylesheet" href="/cs/styles.css">
  <link rel="icon" href="/assets/tuungane.jpeg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="/js/particles-hero.js"></script>
  <style>
    /* Removed redundant styles to allow global styles.css to take over */
  </style>
</head>

<body
  data-django-authenticated="{{ request.user.is_authenticated|yesno:'true,false' }}"
  data-django-username="{{ request.user.get_username|default:'' }}"
  data-django-role="{% if request.user.is_superuser %}superuser{% else %}{{ request.user.role|default:'user' }}{% endif %}"
>
  <main class="auth-main hero">
    <section class="auth-card">
      <div style="margin-bottom: 1.5rem;">
        <img src="/assets/tuungane.jpeg" alt="Afya" style="width:60px;height:60px;border-radius:14px;object-fit:cover;">
      </div>
      <h2 class="auth-title">Welcome Back</h2>
      <p style="color: rgba(255,255,255,0.6); margin-bottom: 2rem;">Sign in to continue your healthcare analysis.</p>

      <form class="auth-form" id="signin-form">
        <div class="form-group">
          <label for="email" class="form-label">Email</label>
          <input type="text" id="email" name="email" class="form-input" placeholder="name@example.com" required>
        </div>
        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required>
        </div>
        <div style="text-align: right; margin-top: -0.5rem; margin-bottom: 1rem;">
          <a href="/forgot-password" style="color: #2497f3; font-size: 0.85rem; text-decoration: none;">Forgot Password?</a>
        </div>
        <button type="button" class="cta-btn auth-btn" id="login-btn">Login</button>
      </form>
      <p class="signup-link">Don't have an account? <a href="/signup">Sign up</a></p>
    </section>
  </main>
  <script type="module" src="/js/layout.js?v=5"></script>
  <script type="module" src="/js/script.js?v=3"></script>
</body>

</html>
