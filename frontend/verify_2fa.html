<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Code | Afya eHealth</title>
  <link rel="stylesheet" href="/cs/styles.css">
  <link rel="icon" href="/assets/favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .form-input {
      border-radius: 12px;
      padding: 0.8rem 1.2rem;
      border: 1.5px solid #edf2f7;
      background: #f8fafc;
      transition: all 0.2s;
      text-align: center;
      font-size: 1.5rem;
      letter-spacing: 0.5rem;
      font-weight: 700;
    }
    .form-input:focus {
      border-color: #2497f3;
      background: #fff;
      box-shadow: 0 0 0 4px rgba(36, 151, 243, 0.1);
    }
    .auth-btn {
      padding: 1rem;
      border-radius: 12px;
      background: linear-gradient(135deg, #2497f3 0%, #1771c6 100%);
      font-weight: 700;
      margin-top: 1.5rem;
    }
  </style>
</head>
<body>
  <main class="auth-main">
    <section class="auth-card">
      <div style="margin-bottom: 1.5rem;">
        <span style="font-size: 2.5rem;">📩</span>
      </div>
      <h2 class="auth-title">Verify Your Email</h2>
      <p style="color: #718096; margin-top: -2rem; margin-bottom: 2rem;">
        We've sent a 6-digit code to <br> <strong id="user-email">your email</strong>.
      </p>
      
      <form class="auth-form" id="verify-2fa-form">
        <div class="form-group">
          <label for="code" class="form-label">Verification Code</label>
          <input type="text" id="code" name="code" class="form-input" placeholder="000000" maxlength="6" required autofocus>
        </div>
        <button type="submit" class="cta-btn auth-btn">Verify & Sign In</button>
      </form>
      <p class="signup-link">Didn't receive a code? <a href="/signin">Try again</a></p>
    </section>
  </main>
  
  <script>
    document.addEventListener('DOMContentLoaded', () => {
        const email = localStorage.getItem('pending_email');
        if (!email) {
            window.location.href = '/signin';
            return;
        }
        document.getElementById('user-email').textContent = email;

        const form = document.getElementById('verify-2fa-form');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const code = document.getElementById('code').value.trim();
            
            try {
                const response = await fetch('/api/verify-2fa', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, code })
                });

                const data = await response.json();
                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.removeItem('pending_email');
                    window.location.href = '/home';
                } else {
                    alert(data.message);
                }
            } catch (error) {
                console.error('Error verifying code:', error);
                alert('An error occurred. Please try again.');
            }
        });
    });
  </script>
</body>
</html>
