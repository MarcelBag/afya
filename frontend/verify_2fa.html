<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Code | Afya eHealth</title>
  <link rel="stylesheet" href="/cs/styles.css">
  <link rel="icon" href="/assets/tuungane.jpeg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700&display=swap"
    rel="stylesheet">

  <style>
    :root {
      --c-blue: #2497f3;
      --c-mid: #1771c6;
      --c-dark: #0a1628;
      --c-navy: #0f2044;
      --c-ink: #0d1117;
      --c-soft: #4a5568;
      --c-muted: #8896ab;
      --c-border: rgba(226, 232, 240, 0.1);
      --c-white: #ffffff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--c-dark);
      color: var(--c-white);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Premium Background (from home.html) */
    .bg-gradient {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 30% 60%, #0e2a5c 0%, #0a1628 45%, #06111f 100%);
      z-index: -1;
    }

    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(36, 151, 243, 0.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(36, 151, 243, 0.055) 1px, transparent 1px);
      background-size: 52px 52px;
      mask-image: radial-gradient(ellipse 80% 80% at center, black 20%, transparent 72%);
      pointer-events: none;
      z-index: -1;
    }

    #particles-js {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 440px;
      padding: 24px;
      animation: hp-rise 0.6s ease both;
    }

    @keyframes hp-rise {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Brand Lockup */
    .brand-lockup {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 40px;
      justify-content: center;
    }

    .brand-img {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      object-fit: cover;
      box-shadow: 0 0 20px rgba(36, 151, 243, 0.2);
    }

    .brand-name {
      font-family: 'Sora', sans-serif;
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .brand-name span {
      background: linear-gradient(100deg, #7dcfff 0%, #2497f3 45%, #aee0ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Auth Card */
    .auth-card {
      background: rgba(13, 17, 23, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.3);
    }

    .card-heading {
      font-family: 'Sora', sans-serif;
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .card-sub {
      color: var(--c-muted);
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .card-sub strong {
      color: var(--c-blue);
    }

    /* Code Input */
    .code-input {
      width: 100%;
      background: rgba(0, 0, 0, 0.3);
      border: 2px solid rgba(36, 151, 243, 0.15);
      border-radius: 16px;
      padding: 18px;
      text-align: center;
      font-size: 2.5rem;
      font-family: 'Sora', sans-serif;
      font-weight: 700;
      letter-spacing: 0.4em;
      color: #fff;
      outline: none;
      transition: all 0.3s;
      margin-bottom: 24px;
    }

    .code-input:focus {
      border-color: var(--c-blue);
      box-shadow: 0 0 20px rgba(36, 151, 243, 0.2);
    }

    /* Expiry Progress */
    .expiry-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      margin-bottom: 6px;
      color: var(--c-muted);
    }

    .expiry-track {
      height: 4px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      margin-bottom: 32px;
      overflow: hidden;
    }

    .expiry-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--c-blue), #63b3ed);
      width: 100%;
      transition: width 1s linear;
    }

    /* Button */
    .submit-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--c-blue), var(--c-mid));
      color: #fff;
      border: none;
      border-radius: 14px;
      font-family: 'Sora', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 8px 25px rgba(36, 151, 243, 0.35);
      transition: all 0.3s;
      margin-bottom: 24px;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 35px rgba(36, 151, 243, 0.5);
    }

    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .card-footer {
      text-align: center;
      font-size: 0.85rem;
      color: var(--c-muted);
    }

    .card-footer a {
      color: var(--c-blue);
      text-decoration: none;
      font-weight: 600;
    }

    .card-footer a:hover {
      text-decoration: underline;
    }

    .security-note {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 12px;
      font-size: 0.75rem;
      color: var(--c-muted);
      margin-top: 24px;
    }
  </style>
</head>

<body class="hero">
  <div class="bg-gradient"></div>
  <div class="bg-grid"></div>

  <div class="wrapper">
    <div class="brand-lockup">
      <img src="/assets/tuungane.jpeg" alt="Afya" class="brand-img">
      <div class="brand-name">Afya <span>eHealth</span></div>
    </div>

    <div class="auth-card">
      <h2 class="card-heading">Security Code</h2>
      <p class="card-sub">
        We've sent a 6-digit verification code to
        <strong id="user-email">your email</strong>.
      </p>

      <form id="verify-2fa-form">
        <input type="text" id="code" name="code" class="code-input" placeholder="000000" maxlength="6"
          inputmode="numeric" required autofocus>

        <div class="expiry-meta">
          <span>Code expires in</span>
          <span id="countdown">5:00</span>
        </div>
        <div class="expiry-track">
          <div class="expiry-fill" id="expiry-bar"></div>
        </div>

        <button type="submit" class="submit-btn" id="submit-btn">
          Verify Identity →
        </button>
      </form>

      <div class="card-footer">
        Didn't get the code? <a href="/signin">Return to Sign In</a>
      </div>

      <div class="security-note">
        <span>🔒</span>
        <span>Expires in 5 minutes. Use once only.</span>
      </div>
    </div>
  </div>

  <script src="/js/particles-hero.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const email = localStorage.getItem('pending_email');
      if (!email) {
        window.location.href = '/signin';
        return;
      }
      document.getElementById('user-email').textContent = email;

      // Countdown (300s)
      let seconds = 300;
      const countdown = document.getElementById('countdown');
      const bar = document.getElementById('expiry-bar');
      
      const timer = setInterval(() => {
        seconds--;
        const m = Math.floor(seconds / 60);
        const s = seconds % 60;
        countdown.textContent = `${m}:${s.toString().padStart(2, '0')}`;
        
        // Progress bar
        const perc = (seconds / 300) * 100;
        bar.style.width = `${perc}%`;

        if (seconds <= 0) {
          clearInterval(timer);
          countdown.textContent = 'Expired';
          document.getElementById('submit-btn').disabled = true;
        }
      }, 1000);

      const form = document.getElementById('verify-2fa-form');
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const code = document.getElementById('code').value.trim();
        const btn = document.getElementById('submit-btn');
        btn.disabled = true;
        btn.textContent = 'Verifying…';

        try {
          const response = await fetch('/api/verify-2fa', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, code })
          });

          const data = await response.json();
          if (response.ok) {
            localStorage.setItem('token', data.token);
            localStorage.removeItem('pending_email');
            window.location.href = '/home';
          } else {
            alert(data.message);
            btn.disabled = false;
            btn.textContent = 'Verify Identity →';
          }
        } catch (error) {
          console.error('Error:', error);
          btn.disabled = false;
          btn.textContent = 'Verify Identity →';
        }
      });
    });
  </script>
</body>

</html>
