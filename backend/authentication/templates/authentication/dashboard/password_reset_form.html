{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password | Afya eHealth</title>
  <link rel="stylesheet" href="{% static 'cs/styles.css' %}">
  <link rel="icon" href="{% static 'assets/tuungane.jpeg' %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="{% static 'js/particles-hero.js' %}"></script>
  <style>
    .auth-error {
      color: #ffd9d9;
      background: rgba(229, 62, 62, 0.13);
      border: 1px solid rgba(229, 62, 62, 0.28);
      border-radius: 10px;
      padding: 0.8rem 0.9rem;
      font-size: 0.88rem;
      line-height: 1.4;
      text-align: left;
    }
  </style>
</head>

<body>
  <main class="auth-main hero">
    <section class="auth-card">
      <div style="margin-bottom: 1.5rem;">
        <img src="{% static 'assets/tuungane.jpeg' %}" alt="Afya" style="width:60px;height:60px;border-radius:14px;object-fit:cover;">
      </div>
      <h2 class="auth-title">Forgot Password</h2>
      <p style="color: rgba(255,255,255,0.6); margin-bottom: 2rem;">Enter your dashboard account email to receive a reset link.</p>

      <form class="auth-form" method="post" novalidate>
        {% csrf_token %}
        <div class="form-group">
          <label for="{{ form.email.id_for_label }}" class="form-label">Email address</label>
          <input
            type="email"
            id="{{ form.email.id_for_label }}"
            name="{{ form.email.html_name }}"
            class="form-input"
            placeholder="name@example.com"
            value="{{ form.email.value|default_if_none:'' }}"
            autocomplete="email"
            required
          >
          {% if form.email.errors %}
            <div class="auth-error">{{ form.email.errors|join:", " }}</div>
          {% endif %}
        </div>
        <button type="submit" class="cta-btn auth-btn">Send Reset Link</button>
      </form>
      <p class="signup-link"><a href="{% url 'authentication:login' %}">Back to Sign In</a></p>
    </section>
  </main>
</body>

</html>
