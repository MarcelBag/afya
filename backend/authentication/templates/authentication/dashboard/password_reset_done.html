{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Link Sent | Afya eHealth</title>
  <link rel="stylesheet" href="{% static 'cs/styles.css' %}">
  <link rel="icon" href="{% static 'assets/tuungane.jpeg' %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="{% static 'js/particles-hero.js' %}"></script>
</head>

<body>
  <main class="auth-main hero">
    <section class="auth-card">
      <div style="margin-bottom: 1.5rem;">
        <img src="{% static 'assets/tuungane.jpeg' %}" alt="Afya" style="width:60px;height:60px;border-radius:14px;object-fit:cover;">
      </div>
      <h2 class="auth-title">Check Your Email</h2>
      <p style="color: rgba(255,255,255,0.6); margin-bottom: 2rem;">If a dashboard account exists for that email, a password reset link has been sent.</p>
      <p class="signup-link"><a href="{% url 'authentication:login' %}">Back to Sign In</a></p>
    </section>
  </main>
</body>

</html>
